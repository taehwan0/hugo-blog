baseURL: https://taehwan0.github.io/hugo-blog/
languageCode: ko-KR
title: taehwan0
theme: ["paper-mod"]

markup:
  goldmark:
    renderer:
      unsafe: true

ignoreLogs:
  - warning-goldmark-raw-html

caches:
  images:
    dir: :cacheDir/images

menu:
  main:
    - identifier: portfolio
      name: Portfolio
      url: https://taehwan0.github.io/portfolio/
      weight: 5
    - identifier: search
      name: Search
      url: /search/
      weight: 10
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 20

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

params:
  homeInfoParams:
    Title: Hello 👋
    Content: |
      이런저런 생각과 경험, 개발 과정에서 배운 것들을 기록합니다.<br/>
      글에 대한 **질문과 피드백**은 언제든지 환영합니다.
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  socialIcons:
    - name: "github"
      url: "https://github.com/taehwan0"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/%ED%83%9C%ED%99%98-%EC%9E%A5-9bb208310/"
    - name: "email"
      url: "mailto:jang_taehwan@naver.com"
  comments: true
  utteranc:
    enable: true
    repo: "taehwan0/hugo-blog"
    issueTerm: "pathname"
    label: "comments"
    theme: "github-dark"
    crossorigin: "anonymous"
